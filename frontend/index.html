<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardVault — Vintage Sports Card Manager</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #f5a623;
            --text: #eee;
            --text-dim: #999;
            --success: #4caf50;
            --border: #2a2a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        header h1 span { color: var(--accent); }

        .stats-bar {
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .stats-bar .stat-value {
            color: var(--accent2);
            font-weight: 600;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Upload Section */
        .upload-section {
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .upload-section:hover, .upload-section.dragover {
            border-color: var(--accent);
        }

        .upload-section h2 { margin-bottom: 0.5rem; font-size: 1.1rem; }
        .upload-section p { color: var(--text-dim); font-size: 0.9rem; }

        .upload-options {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .upload-options label, .upload-options select, .upload-options input {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .upload-options input[type="number"] { width: 60px; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.secondary { background: var(--surface2); }
        button.success { background: var(--success); }

        /* Filters */
        .filters {
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters input, .filters select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .filters input::placeholder { color: var(--text-dim); }
        .filters label { font-size: 0.8rem; color: var(--text-dim); }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .card-item {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.15s, border-color 0.15s;
            cursor: pointer;
        }

        .card-item:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .card-item img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            background: #111;
        }

        .card-info {
            padding: 0.8rem;
        }

        .card-info h3 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        .card-price {
            color: var(--accent2);
            font-weight: 600;
        }

        .card-rarity {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .rarity-common { background: #555; }
        .rarity-uncommon { background: #2e7d32; }
        .rarity-rare { background: #1565c0; }
        .rarity-very-rare { background: #6a1b9a; }
        .rarity-ultra-rare { background: #b71c1c; }

        .card-status {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--surface2);
        }

        .status-pending { color: var(--accent2); }
        .status-identified { color: var(--success); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal img {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            background: #111;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .modal h2 { margin-bottom: 1rem; }

        .modal-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .modal-details .field {
            font-size: 0.85rem;
        }

        .modal-details .field-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 1rem 0;
            display: none;
        }

        .progress-bar.active { display: block; }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state h3 { margin-bottom: 0.5rem; color: var(--text); }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface2);
            color: var(--text);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            font-size: 0.9rem;
            z-index: 200;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1><span>Card</span>Vault</h1>
        <div class="stats-bar" id="statsBar">
            <div>Cards: <span class="stat-value" id="statTotal">0</span></div>
            <div>Identified: <span class="stat-value" id="statIdentified">0</span></div>
            <div>Pending: <span class="stat-value" id="statPending">0</span></div>
            <div>Est. Value: <span class="stat-value" id="statValue">$0</span></div>
        </div>
    </header>

    <div class="container">
        <!-- Upload -->
        <div class="upload-section" id="uploadSection">
            <h2>Upload Card Grid Photo</h2>
            <p>Drag & drop a photo of cards laid out in a grid, or click to browse</p>
            <input type="file" id="fileInput" accept="image/*" hidden>
            <div class="upload-options" onclick="event.stopPropagation()">
                <label>Mode:
                    <select id="segMode">
                        <option value="auto">Auto-detect</option>
                        <option value="grid">Fixed grid</option>
                    </select>
                </label>
                <label id="rowsLabel" style="display:none">Rows:
                    <input type="number" id="gridRows" min="1" max="20" value="3">
                </label>
                <label id="colsLabel" style="display:none">Cols:
                    <input type="number" id="gridCols" min="1" max="20" value="3">
                </label>
                <button id="uploadBtn" disabled>Upload & Segment</button>
            </div>
            <div class="progress-bar" id="uploadProgress"><div class="fill" id="uploadFill"></div></div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="filterPlayer" placeholder="Search player name...">
            <select id="filterSport">
                <option value="">All Sports</option>
                <option value="baseball">Baseball</option>
                <option value="basketball">Basketball</option>
                <option value="football">Football</option>
                <option value="hockey">Hockey</option>
            </select>
            <select id="filterRarity">
                <option value="">All Rarities</option>
                <option value="Common">Common</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Very Rare">Very Rare</option>
                <option value="Ultra Rare">Ultra Rare</option>
            </select>
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="identified">Identified</option>
            </select>
            <label>Sort:
                <select id="sortBy">
                    <option value="id">Newest</option>
                    <option value="player_name">Player Name</option>
                    <option value="year">Year</option>
                    <option value="estimated_price_high">Price (High)</option>
                </select>
            </label>
            <button class="secondary" onclick="loadCards()">Apply</button>
        </div>

        <!-- Cards -->
        <div class="card-grid" id="cardGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none">
            <h3>No cards yet</h3>
            <p>Upload a photo of your cards to get started</p>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Card Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <img id="modalImg" src="">
            <h2 id="modalTitle">Card Details</h2>
            <div class="modal-details" id="modalDetails"></div>
            <div class="modal-actions">
                <button onclick="identifyCard()" id="modalIdentifyBtn">Identify with AI</button>
                <button class="secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

<script>
const API = '';
let currentPage = 0;
const PAGE_SIZE = 50;
let selectedCardId = null;

// Stats
async function loadStats() {
    try {
        const res = await fetch(`${API}/api/stats`);
        const s = await res.json();
        document.getElementById('statTotal').textContent = s.total_cards;
        document.getElementById('statIdentified').textContent = s.identified;
        document.getElementById('statPending').textContent = s.pending;
        const val = s.total_value_high > 0
            ? `$${s.total_value_low.toLocaleString()} - $${s.total_value_high.toLocaleString()}`
            : '$0';
        document.getElementById('statValue').textContent = val;
    } catch (e) { console.error('Stats error:', e); }
}

// Cards
async function loadCards() {
    const params = new URLSearchParams();
    const player = document.getElementById('filterPlayer').value;
    const sport = document.getElementById('filterSport').value;
    const rarity = document.getElementById('filterRarity').value;
    const status = document.getElementById('filterStatus').value;
    const sortBy = document.getElementById('sortBy').value;

    if (player) params.set('player_name', player);
    if (sport) params.set('sport', sport);
    if (rarity) params.set('rarity', rarity);
    if (status) params.set('status', status);
    params.set('sort_by', sortBy);
    params.set('sort_dir', sortBy === 'estimated_price_high' ? 'desc' : sortBy === 'id' ? 'desc' : 'asc');
    params.set('limit', PAGE_SIZE);
    params.set('offset', currentPage * PAGE_SIZE);

    try {
        const res = await fetch(`${API}/api/cards?${params}`);
        const data = await res.json();
        renderCards(data.cards);
        renderPagination(data.total);
    } catch (e) { console.error('Cards error:', e); }
}

function renderCards(cards) {
    const grid = document.getElementById('cardGrid');
    const empty = document.getElementById('emptyState');

    if (!cards.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    grid.innerHTML = cards.map(c => `
        <div class="card-item" onclick="openCard(${c.id})">
            <img src="/images/cards/${c.image_path}" alt="Card" loading="lazy">
            <div class="card-info">
                <h3>${c.player_name || 'Unidentified Card'}</h3>
                <div class="card-meta">
                    <span>${c.year ? c.year + ' ' + (c.card_set || '') : ''}</span>
                    ${c.rarity ? `<span class="card-rarity rarity-${c.rarity.toLowerCase().replace(/\s+/g, '-')}">${c.rarity}</span>` : ''}
                </div>
                <div class="card-meta" style="margin-top:4px">
                    ${c.estimated_price_high ? `<span class="card-price">$${c.estimated_price_low} - $${c.estimated_price_high}</span>` : ''}
                    <span class="card-status status-${c.status}">${c.status}</span>
                </div>
            </div>
        </div>
    `).join('');
}

function renderPagination(total) {
    const pages = Math.ceil(total / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 0; i < pages; i++) {
        html += `<button class="${i === currentPage ? '' : 'secondary'}" onclick="goPage(${i})">${i + 1}</button>`;
    }
    el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadCards(); }

// Upload
const uploadSection = document.getElementById('uploadSection');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const segMode = document.getElementById('segMode');

uploadSection.addEventListener('click', () => fileInput.click());
uploadSection.addEventListener('dragover', e => { e.preventDefault(); uploadSection.classList.add('dragover'); });
uploadSection.addEventListener('dragleave', () => uploadSection.classList.remove('dragover'));
uploadSection.addEventListener('drop', e => {
    e.preventDefault();
    uploadSection.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        uploadBtn.disabled = false;
    }
});

fileInput.addEventListener('change', () => { uploadBtn.disabled = !fileInput.files.length; });

segMode.addEventListener('change', () => {
    const isGrid = segMode.value === 'grid';
    document.getElementById('rowsLabel').style.display = isGrid ? '' : 'none';
    document.getElementById('colsLabel').style.display = isGrid ? '' : 'none';
});

uploadBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!fileInput.files.length) return;

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const params = new URLSearchParams();
    params.set('mode', segMode.value);
    if (segMode.value === 'grid') {
        params.set('rows', document.getElementById('gridRows').value);
        params.set('cols', document.getElementById('gridCols').value);
    }

    uploadBtn.disabled = true;
    uploadBtn.textContent = 'Processing...';
    const progress = document.getElementById('uploadProgress');
    const fill = document.getElementById('uploadFill');
    progress.classList.add('active');
    fill.style.width = '30%';

    try {
        const res = await fetch(`${API}/api/upload?${params}`, { method: 'POST', body: formData });
        fill.style.width = '80%';

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Upload failed');
        }

        const data = await res.json();
        fill.style.width = '100%';
        toast(`Detected ${data.cards_detected} cards from photo`);

        setTimeout(() => {
            progress.classList.remove('active');
            fill.style.width = '0';
        }, 1000);

        loadCards();
        loadStats();
    } catch (e) {
        toast('Error: ' + e.message);
        progress.classList.remove('active');
    } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload & Segment';
        fileInput.value = '';
    }
});

// Modal
async function openCard(id) {
    selectedCardId = id;
    try {
        const res = await fetch(`${API}/api/cards/${id}`);
        const c = await res.json();

        document.getElementById('modalImg').src = `/images/cards/${c.image_path}`;
        document.getElementById('modalTitle').textContent = c.player_name || 'Unidentified Card';
        document.getElementById('modalIdentifyBtn').style.display = c.status === 'pending' ? '' : 'none';

        const fields = [
            ['Year', c.year],
            ['Set', c.card_set],
            ['Card #', c.card_number],
            ['Manufacturer', c.manufacturer],
            ['Sport', c.sport],
            ['Condition', c.condition],
            ['Condition Notes', c.condition_notes],
            ['Rarity', c.rarity],
            ['Price Range', c.estimated_price_high ? `$${c.estimated_price_low} - $${c.estimated_price_high}` : null],
            ['AI Confidence', c.ai_confidence ? (c.ai_confidence * 100).toFixed(0) + '%' : null],
            ['Status', c.status],
            ['Batch', c.batch_id],
        ];

        document.getElementById('modalDetails').innerHTML = fields
            .filter(([, v]) => v != null)
            .map(([label, val]) => `<div class="field"><div class="field-label">${label}</div><div>${val}</div></div>`)
            .join('');

        document.getElementById('modalOverlay').classList.add('active');
    } catch (e) { console.error(e); }
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    selectedCardId = null;
}

async function identifyCard() {
    if (!selectedCardId) return;
    const btn = document.getElementById('modalIdentifyBtn');
    btn.disabled = true;
    btn.textContent = 'Identifying...';

    try {
        const res = await fetch(`${API}/api/cards/${selectedCardId}/identify`, { method: 'POST' });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Identification failed');
        }
        toast('Card identified successfully');
        openCard(selectedCardId);
        loadCards();
        loadStats();
    } catch (e) {
        toast('Error: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Identify with AI';
    }
}

// Toast
function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// Init
loadStats();
loadCards();
</script>
</body>
</html>
